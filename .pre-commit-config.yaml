---
# Local pre-commit hooks mirroring the CICD workflow lint jobs.
# Run `pre-commit install` once, then hooks fire on `git commit`.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
      - id: check-json
      - id: check-merge-conflict
      - id: check-shebang-scripts-are-executable
      - id: check-yaml
        args: [--allow-multiple-documents]
        # SOPS-encrypted documents aren't meant to be parsed/reformatted.
        exclude: ^secrets/.*\.sops\..*$
      - id: detect-aws-credentials
        args: [--allow-missing-credentials]
      - id: detect-private-key
        # Encrypted SOPS payloads legitimately contain key-like ciphertext.
        exclude: ^secrets/.*\.sops\.enc\..*$
      - id: end-of-file-fixer
      - id: fix-byte-order-marker
      - id: mixed-line-ending
        args: ['--fix=auto']
      - id: trailing-whitespace

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [-c, .yamllint.yml, .]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
