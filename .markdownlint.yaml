---
# markdownlint config — https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md
# Defaults apply unless overridden below. The global CLAUDE.md rule that
# headings/lists must be surrounded by blank lines (MD022/MD032) is already
# on by default — no need to restate.

default: true

# MD013 — line-length. Prose docs with long URLs/tables don't fit in 80 cols
# and re-wrapping fights with prettier's `proseWrap: preserve`. Disable.
MD013: false

# MD033 — inline HTML. Allowed: mermaid blocks and the occasional <br/>.
MD033: false

# MD034 — bare URLs. Keep on; wrap URLs in <> or [text](url).
MD034: true

# MD036 — emphasis used as heading. We use bold lines as inline labels
# inside list items ("**Status:**", "**Author:**"). Allow.
MD036: false

# MD041 — first line must be a top-level heading. Allow front-matter style
# (e.g. docs starting with badges/links).
MD041: false

# MD024 — duplicate headings. Allow when nested under different parents
# (e.g. "### Edit a secret" appearing in multiple sections is fine).
MD024:
  siblings_only: true

# MD046 — code block style. Force fenced (```), not indented.
MD046:
  style: fenced

# MD048 — code fence style. Force backticks, not tildes.
MD048:
  style: backtick

# MD049 — emphasis style. Prettier emits `_italic_`; aligning here so
# `make fix-md` (prettier last) lands on a markdownlint-clean state.
MD049:
  style: underscore

# MD050 — strong style. Prettier emits `**bold**`.
MD050:
  style: asterisk

# MD060 — table column style. We use padded tables (spaces around pipes);
# prettier emits the same. Disable to avoid policing whitespace inside cells.
MD060: false
