---
name: CICD Workflow

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - '**'
  push:
    # Exclude the branches this workflow itself force-pushes from the
    # `update-workflows` step. Those branches are workflow OUTPUTS, not
    # inputs — re-running CICD on them produces an infinite loop because
    # GitVersion folds the branch name into the next pre-release label
    # (`prerelease/v0.0.2-develop.1` → next semVer becomes
    # `0.0.2-prerelease-v0-0-2-develop-1.1`, ad infinitum). `[skip ci]`
    # in the commit message doesn't help here: pushes made with an App
    # installation token bypass the GITHUB_TOKEN trigger-suppression
    # protection that `[skip ci]` relies on.
    branches-ignore:
      - 'prerelease/**'
      - 'release/**'

  workflow_dispatch:

concurrency:
  group: cicd-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.event_name != 'push' || github.ref_name != github.event.repository.default_branch }}

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  actionlint:
    name: Action Lint
    runs-on: ${{ vars.RUNS_ON_ARM64 || vars.RUNS_ON || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Lint-only job — no need for full history or tags.
          # `fetch-depth: 1` shaves seconds off the clone; `fetch-tags:
          # false` skips downloading the repo's tag set (cheap unless
          # there's tag pollution, in which case very cheap).
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.ref }}
          fetch-depth: 1
          fetch-tags: false

      - name: Run actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          reporter: github-check
          fail_level: error
          actionlint_flags: -shellcheck=shellcheck

  yamllint:
    name: Yaml Lint
    runs-on: ${{ vars.RUNS_ON_ARM64 || vars.RUNS_ON || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Lint-only job — see actionlint job for the same comment.
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.ref }}
          fetch-depth: 1
          fetch-tags: false

      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
          # `cache: 'pip'` reuses ~/.cache/pip across runs. Without a
          # `requirements.txt`, we point `cache-dependency-path` at the
          # .python-version file so the cache key is stable per Python
          # version (the only thing that ought to invalidate it).
          cache: 'pip'
          cache-dependency-path: |
            .python-version

      - name: Install yamllint
        run: pip install --upgrade yamllint

      - name: Run yamllint
        run: yamllint .

  markdownlint:
    name: Markdown Lint
    runs-on: ${{ vars.RUNS_ON_ARM64 || vars.RUNS_ON || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Lint-only job — see actionlint job for the same comment.
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.ref }}
          fetch-depth: 1
          fetch-tags: false

      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          # The final pattern excludes internal AI-workflow scratch artifacts
          # (brainstorming plans/specs under superpowers/). They intentionally
          # embed markdown-in-markdown file skeletons, which inherently
          # conflict with MD031/MD040 fenced-code rules.
          globs: |
            **/*.md
            !node_modules
            !.venv
            !CHANGELOG.md
            !**/superpowers/**

  action-docs-check:
    name: Action Docs Check
    runs-on: ${{ vars.RUNS_ON_ARM64 || vars.RUNS_ON || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Lint-only job — see actionlint job for the same comment.
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.ref }}
          fetch-depth: 1
          fetch-tags: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Cache npx action-docs
        uses: actions/cache@v5
        with:
          # `npx --yes action-docs@^2 ...` downloads action-docs (and
          # its deps) into the global npm cache on each invocation.
          # Caching ~/.npm preserves the downloaded tarballs across
          # runs; subsequent npx calls find them locally instead of
          # hitting registry.npmjs.org for every action.yml processed.
          # Key includes the major-version pin (`-2`) so a bump to
          # `^3` would naturally invalidate.
          path: ~/.npm
          key: npx-action-docs-${{ runner.os }}-2
          restore-keys: |
            npx-action-docs-${{ runner.os }}-

      - name: Check action README's are in sync with action.yml
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          mapfile -t actions < <(find "$(pwd)" -mindepth 2 -maxdepth 2 -name action.yml)
          if (( ${#actions[@]} == 0 )); then
            echo "No actions present; action-docs check is a no-op."
            exit 0
          fi
          fail=0
          for f in "${actions[@]}"; do
            dir="$(dirname "$f")"
            echo "::group::Checking $dir"
            if [[ ! -f "$dir/README.md" ]]; then
              echo "::error file=$f::Missing README.md for $dir. Create it with action-docs markers, then run: npx action-docs --update-readme --source $f"
              fail=1
              echo "::endgroup::"
              continue
            fi
            cp "$dir/README.md" "$dir/README.md.bak"
            if ! npx --yes action-docs@^2 --no-banner --source "$f" --update-readme; then
              echo "::error file=$f::action-docs failed to process $f"
              mv "$dir/README.md.bak" "$dir/README.md"
              fail=1
              echo "::endgroup::"
              continue
            fi
            if ! diff -q "$dir/README.md" "$dir/README.md.bak" >/dev/null; then
              echo "::error file=$dir/README.md::README.md is out of sync with action.yml. Run: npx action-docs --update-readme --source $f"
              diff -u "$dir/README.md.bak" "$dir/README.md" || true
              fail=1
            fi
            mv "$dir/README.md.bak" "$dir/README.md"
            echo "::endgroup::"
          done
          exit "$fail"

  gitleaks:
    name: Gitleaks
    runs-on: ${{ vars.RUNS_ON_ARM64 || vars.RUNS_ON || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Gitleaks scans full git history for leaked secrets, so we
          # keep `fetch-depth: 0`. Tags aren't part of the scan, so
          # `fetch-tags: false` saves the tag-download time without
          # affecting coverage.
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.ref }}
          fetch-depth: 0
          fetch-tags: false

      - name: Run gitleaks
        uses: elioetibr/gitleaks-action@v2.3.10-23
        env:
          GITHUB_TOKEN: ${{ github.token }}
          # Org-level license secret (visibility: all). Required by
          # gitleaks-action@v2 for organization-owned repos.
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  all-green:
    name: All Green
    runs-on: ${{ vars.RUNS_ON_ARM64 || vars.RUNS_ON || 'ubuntu-latest' }}
    needs: [actionlint, yamllint, markdownlint, action-docs-check, gitleaks]
    if: always()
    steps:
      - name: Verify all required checks passed
        shell: bash -l {0}
        run: |
          #!/usr/bin/env bash

          set -euo pipefail

          results='${{ toJSON(needs) }}'
          echo "$results"
          if echo "$results" | grep -Eq '"result":\s*"(failure|cancelled)"'; then
            echo "::error::One or more required checks failed or were cancelled."
            exit 1
          fi
          echo "All required checks passed."

