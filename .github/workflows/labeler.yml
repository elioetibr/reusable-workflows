---
name: labeler

on:
  pull_request_target:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: labeler-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  label-files:
    name: Label by changed files
    runs-on: ${{ vars.RUNS_ON_ARM64 || vars.RUNS_ON || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v6

      - name: Label PR based on file paths
        uses: actions/labeler@v6
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          sync-labels: true

  label-conventional-commits:
    name: Label by conventional commit type
    runs-on: ${{ vars.RUNS_ON_ARM64 || vars.RUNS_ON || 'ubuntu-latest' }}
    steps:
      - name: Label PR from conventional commit title
        uses: bcoe/conventional-release-labels@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          type_labels: |
            {
              "feat": "type:feature",
              "fix": "type:bugfix",
              "docs": "type:documentation",
              "style": "type:style",
              "refactor": "type:refactor",
              "perf": "type:performance",
              "test": "type:test",
              "build": "type:build",
              "ci": "type:ci",
              "chore": "type:chore",
              "revert": "type:revert",
              "init": "type:init"
            }
          ignored_types: '[]'

  label-semver-bump:
    name: Label version bump (GitVersion)
    runs-on: ${{ vars.RUNS_ON_ARM64 || vars.RUNS_ON || 'ubuntu-latest' }}
    steps:
      - name: Determine version bump
        id: bump
        env:
          # Read via env to avoid shell injection through PR-supplied content.
          TITLE: ${{ github.event.pull_request.title }}
          BODY: ${{ github.event.pull_request.body }}
        run: |
          # Mirror GitVersion.yml: only +semver: annotations override the
          # default. Branch `main` auto-increments Patch, so a PR with no
          # annotation gets bump:patch.
          MSG="${TITLE}
          ${BODY}"
          if printf '%s' "$MSG" | grep -Pq '\b(\+|semver:)\s?(bump|break(?:ing)?|major)\b'; then
            echo "bump=major" >> "$GITHUB_OUTPUT"
          elif printf '%s' "$MSG" | grep -Pq '\b(\+|semver:)\s?(feat(?:ure)?|minor)\b'; then
            echo "bump=minor" >> "$GITHUB_OUTPUT"
          elif printf '%s' "$MSG" | grep -Pq '\b(\+|semver:)\s?(none|skip)\b'; then
            echo "bump=none" >> "$GITHUB_OUTPUT"
          else
            echo "bump=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Remove existing bump labels
        uses: actions/github-script@v9
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const bumpLabels = ['bump:major', 'bump:minor', 'bump:patch', 'bump:none'];
            for (const label of bumpLabels) {
              try {
                await github.rest.issues.removeLabel({ owner, repo, issue_number, name: label });
              } catch (e) {
                // Label not applied — ignore.
              }
            }

      - name: Add version bump label
        if: steps.bump.outputs.bump != 'unknown'
        uses: actions/github-script@v9
        env:
          BUMP: ${{ steps.bump.outputs.bump }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const bump = process.env.BUMP;
            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number,
              labels: [`bump:${bump}`]
            });
