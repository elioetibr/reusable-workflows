name: "GitHub Actions Bot Setup"
description: "Setup GitHub Actions Bot Configuration"
author: Elio Severo Junior <elioseverojunior@gmail.com>


inputs:
  bot-email:
    description: "GitHub App Bot Email."
    required: false
    default: "41898282+github-actions[bot]@users.noreply.github.com"
  bot-username:
    description: "GitHub App Bot Username."
    required: false
    default: "github-actions[bot]"

outputs:
  bot-email:
    description: "GitHub App Bot Email."
    value: ${{ steps.gha-bot-config.outputs.bot-email }}
  bot-username:
    description: "GitHub App Bot Username."
    value: ${{ steps.gha-bot-config.outputs.bot-username }}

runs:
  using: "composite"
  steps:
    - name: GitHub Actions Bot Configuration
      id: gha-bot-config
      env:
        GITHUB_BOT_EMAIL: ${{ inputs.bot-email || '41898282+github-actions[bot]@users.noreply.github.com' }}
        GITHUB_BOT_USERNAME: ${{ inputs.bot-username || 'github-actions[bot]' }}
      shell: bash -l {0}
      run: |
        #!/usr/bin/env bash

        set -euo pipefail

        echo "GITHUB_BOT_EMAIL=${{ env.GITHUB_BOT_EMAIL }}" >> "$GITHUB_ENV"
        echo "GITHUB_BOT_USERNAME=${{ env.GITHUB_BOT_USERNAME }}" >> "$GITHUB_ENV"

        git config --global author.email "${{ env.GITHUB_BOT_EMAIL }}"
        git config --global author.name "${{ env.GITHUB_BOT_USERNAME }}"
        git config --global committer.email "${{ env.GITHUB_BOT_EMAIL }}"
        git config --global committer.name "${{ env.GITHUB_BOT_USERNAME }}"
        git config --global init.defaultBranch ${{ github.event.repository.default_branch }}
        git config --global pull.ff only
        git config --global pull.rebase true
        git config --global push.autosetupremote true
        git config --global push.followTags true
        git config --global user.email "${{ env.GITHUB_BOT_EMAIL }}"
        git config --global user.name "${{ env.GITHUB_BOT_USERNAME }}"

        echo "bot-email=${{ env.GITHUB_BOT_EMAIL }}" >> "$GITHUB_OUTPUT"
        echo "bot-username=${{ env.GITHUB_BOT_USERNAME }}" >> "$GITHUB_OUTPUT"

        echo "GitHub Actions Bot configured with email: ${GITHUB_BOT_EMAIL} and username: ${GITHUB_BOT_USERNAME}"
