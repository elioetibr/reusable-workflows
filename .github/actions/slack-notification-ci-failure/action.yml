name: Slack Notification CI Failure
description: 'Slack Notification CI Failure'

inputs:
  channel-id:
    required: true
    description: Slack Channels IDs
  slack-bot-token:
    required: true
    description: Slack Bot Token

runs:
  using: composite
  steps:
    - id: slack
      uses: slackapi/slack-github-action@v1.26.0
      with:
        channel-id: '${{ inputs.channel-id }}'
        payload: |
          {
            "text": "*Build Failure* :fire:",
            "attachments": [
              {
                "pretext": "Hello,\n\nthe workflow *${{ github.workflow }} Job ${{ github.job }} is failing*.",
                "color": "e71a43",
                "fields": [
                  {
                    "title": "GitHub Actions",
                    "short": false,
                    "value": "${{ github.event.repository.html_url }}/actions/runs/${{ github.run_id }}"
                  },
                  {
                    "title": "Branch",
                    "short": false,
                    "value": "${{ github.event.repository.html_url }}/tree/${{ github.ref_name }}"
                  },
                  {
                    "title": "Commit Hash",
                    "short": false,
                    "value": "${{ github.event.pull_request.html_url || github.event.head_commit.url }}"
                  },
                  {
                    "title": "Committer",
                    "short": false,
                    "value": "${{ github.event.head_commit.author.username }}"
                  },
                  {
                    "title": "Status",
                    "short": false,
                    "value": "*Failure* :red_circle:"
                  }
                ]
              }
            ]
          }
      env:
        SLACK_BOT_TOKEN: ${{ inputs.slack-bot-token }}
